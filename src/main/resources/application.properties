spring.application.name=manufacturing-system

# ============================================
# Database Configuration (PostgreSQL)
# ============================================
spring.datasource.url=jdbc:postgresql://localhost:5432/pharmatrust_db
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:5593}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${SHOW_SQL:false}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Flyway Database Migration (Temporarily disabled for demo)
spring.flyway.enabled=false
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration
spring.flyway.validate-on-migrate=true
# Ensure Flyway runs before JPA initialization
spring.jpa.defer-datasource-initialization=false

# ============================================
# JWT Configuration
# ============================================
jwt.secret=${JWT_SECRET:your-512-bit-secret-key-change-this-in-production-minimum-64-characters-required}
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# ============================================
# AWS S3 Configuration
# ============================================
aws.s3.bucket-name=${S3_BUCKET_NAME:pharmatrust-lab-reports}
aws.s3.region=${AWS_REGION:us-east-1}
aws.access-key-id=${AWS_ACCESS_KEY:}
aws.secret-access-key=${AWS_SECRET_KEY:}
aws.s3.presigned-url-expiration-minutes=15
# Dev mode: skip actual S3 upload, just hash the file locally
aws.s3.mock-upload=${S3_MOCK_UPLOAD:true}

# AWS Secrets Manager
aws.secrets.enabled=${AWS_SECRETS_ENABLED:false}
aws.secrets.key-prefix=pharmatrust/

# ============================================
# Blockchain Configuration (Ethereum Sepolia Testnet)
# ============================================
# For testnet: set BLOCKCHAIN_RPC_URL=https://sepolia.infura.io/v3/YOUR_PROJECT_ID
# For local Hardhat/Ganache: http://localhost:8545
blockchain.network-url=${BLOCKCHAIN_RPC_URL:http://localhost:8545}
blockchain.contract-address=${CONTRACT_ADDRESS:}
blockchain.private-key=${BLOCKCHAIN_PRIVATE_KEY:}
blockchain.gas-optimization=true
blockchain.merkle-only=true
blockchain.confirmation-blocks=12
# Chain ID: 11155111 = Sepolia, 1337 = local Hardhat
blockchain.chain-id=${BLOCKCHAIN_CHAIN_ID:1337}

# ============================================
# RabbitMQ Configuration
# ============================================
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USER:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}
# Disable RabbitMQ listener auto-startup if connection fails
spring.rabbitmq.listener.simple.auto-startup=false
spring.rabbitmq.listener.simple.retry.enabled=false
spring.rabbitmq.listener.simple.missing-queues-fatal=false
spring.rabbitmq.template.retry.enabled=false
# Suppress connection retry logs
logging.level.org.springframework.amqp.rabbit.listener=ERROR
logging.level.org.springframework.amqp.rabbit.connection=ERROR

# Queue Names
queue.unit-generation=unit-generation-queue
queue.qr-generation=qr-generation-queue
queue.blockchain-mint=blockchain-mint-queue

# ============================================
# Redis Configuration
# ============================================
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=2000

# cache.redis.enabled=true uses Redis if available, falls back to in-memory automatically
cache.redis.enabled=${REDIS_ENABLED:false}

# ============================================
# Rate Limiting (Bucket4j)
# ============================================
rate-limit.enabled=${RATE_LIMIT_ENABLED:true}
rate-limit.auth.requests-per-minute=10
rate-limit.scan.requests-per-minute=60
rate-limit.general.requests-per-minute=100

# ============================================
# Async Configuration
# ============================================
spring.task.execution.pool.core-size=10
spring.task.execution.pool.max-size=50
spring.task.execution.pool.queue-capacity=1000
spring.task.execution.thread-name-prefix=pharma-async-

# ============================================
# QR Security Configuration
# ============================================
qr.max-scan-limit=5
qr.scan-warning-threshold=3
qr.offline-verification-enabled=true

# ============================================
# AI Sentinel Configuration
# ============================================
ai.max-travel-speed-kmh=200
ai.simultaneous-scan-threshold-minutes=5
ai.auto-killswitch-enabled=true
ai.anomaly-threshold=0.7
ai.critical-anomaly-threshold=1.0

# ============================================
# Security Configuration
# ============================================
security.rate-limit.requests-per-minute=100
security.cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000,http://localhost:5173,http://10.184.81.201:3000,http://10.184.81.201:5173}
security.regulator.ip-whitelist=${REGULATOR_IPS:}

# ============================================
# Monitoring & Observability
# ============================================
management.endpoints.web.exposure.include=health,metrics,prometheus,info
management.endpoint.health.show-details=when-authorized
management.metrics.export.prometheus.enabled=true

# Logging
logging.level.root=INFO
logging.level.pharmatrust=DEBUG
logging.level.org.springframework.security=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# ============================================
# Server Configuration
# ============================================
server.port=8080
server.error.include-message=always
server.error.include-binding-errors=always

# ============================================
# File Upload Configuration
# ============================================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ============================================
# OpenAPI/Swagger Configuration
# ============================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
